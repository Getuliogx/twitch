<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xflix - Configurar Lista</title>
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Configurar Lista</h1>

    <div class="top-controls">
      <input type="text" id="searchInput" placeholder="Buscar filme, série ou anime...">

      <select id="sortSelect">
        <option value="az">A-Z</option>
        <option value="recent">adicionado recente</option>
        <option value="oldest">adicionado antigo</option>
      </select>
    </div>

    <div id="statusMsg" class="status"></div>

    <section class="category-section">
      <h2>Resultados da busca</h2>
      <div id="results" class="horizontal-list"></div>
    </section>

    <section class="category-section favorites-drop-section">
      <h2>Favoritos</h2>
      <div id="favoritesList" class="horizontal-list drop-zone"></div>
    </section>

    <section class="category-section">
      <h2>Filmes</h2>
      <div id="moviesList" class="horizontal-list"></div>
    </section>

    <section class="category-section">
      <h2>Séries</h2>
      <div id="seriesList" class="horizontal-list"></div>
    </section>

    <section class="category-section">
      <h2>Animes</h2>
      <div id="animeList" class="horizontal-list"></div>
    </section>
  </main>

  <script src="config.js"></script>
</body>
</html>
